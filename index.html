<!-- index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пиратская сходка</title>
    <style>
        body {
            margin: 0;
            font-family: "Trebuchet MS", Arial, sans-serif;
            background: radial-gradient(circle at top, #222 0, #000 60%);
            color: #f5e6b3;
            text-align: center;
        }
        .wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .logo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 3px solid #c00;
            background: url("rodger.png") center/cover no-repeat;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0 0 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        p {
            margin: 5px 0 20px;
        }
        .qr-box {
            background: rgba(0,0,0,0.7);
            padding: 16px 20px;
            border: 2px dashed #caa25d;
            border-radius: 12px;
        }
        .qr-box img {
            width: 220px;
            height: 220px;
            display: block;
        }
        .note {
            margin-top: 10px;
            font-size: 14px;
            color: #e0d2a0;
        }
        a {
            color: #f5e6b3;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="logo"></div>
    <h1>Добро пожаловать на борт!</h1>
    <p>Отсканируй пиратский знак, чтобы получить <br>секретное приглашение на вечеринку.</p>

    <div class="qr-box">
        <img src="" alt="QR код приглашения">
    </div>
</div>
</body>
</html>
