<!DOCTYPE html>
<html>
<head>
  <meta charset="windows-1251">
  <title>Вычисление степени</title>
  <style>
    body { font-family: Arial, sans-serif; background: #fff; margin: 8px 12px; font-size: 13px; }
    h3 { font-size: 14px; font-weight: bold; margin: 0 0 4px 0; }
    input[type=text] { width: 160px; border: 2px inset #999; padding: 1px 2px; font-size: 13px; display: block; margin-bottom: 8px; }
    .btn-row { margin-top: 4px; }
    input[type=button] { padding: 2px 10px; font-size: 13px; border: 2px outset #ccc; background: #d4d0c8; cursor: pointer; margin-right: 4px; }
    input[type=button]:active { border-style: inset; }
  </style>
</head>
<body>

  <h3>Введите свою фамилию</h3>
  <input type="text" id="fam" value="">

  <h3>Введите число</h3>
  <input type="text" id="num" value="">

  <h3>Введите степень числа</h3>
  <input type="text" id="pow" value="">

  <h3>Результат</h3>
  <input type="text" id="res" value="">

  <div class="btn-row">
    <input type="button" value="OK" onclick="calc()">
    <input type="button" value="Очистить" onclick="clearAll()">
  </div>

<script>
function calc() {
  var n = parseFloat(document.getElementById('num').value);
  var p = parseFloat(document.getElementById('pow').value);
  if (isNaN(n) || isNaN(p)) { alert('Введите число и степень'); return; }
  document.getElementById('res').value = Math.pow(n, p);
}
function clearAll() {
  document.getElementById('fam').value = '';
  document.getElementById('num').value = '';
  document.getElementById('pow').value = '';
  document.getElementById('res').value = '';
}
</script>
</body>
</html>
