<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Стили абзацев (Билет 23)</title>
    <link rel="stylesheet" href="styles23.css">
    <style>
        /* внутренняя таблица стилей: первые строки абзацев */
        p::first-line {
            font-weight: bold;
            color: darkgreen;
        }
    </style>
</head>
<body>
<h2>Оформление абзацев</h2>

<p class="styled">
    Первый абзац: первая строка и первая буква оформлены разными стилями.
    Остальная часть абзаца отображается обычным шрифтом.
</p>

<p>
    Второй абзац: только первая строка выделена внутренним стилем.
</p>
</body>
</html>
