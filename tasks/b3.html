<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Проверка ответа</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        .container {
            max-width: 400px;
            border: 1px solid #ccc;
            padding: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input, button {
            margin-top: 5px;
            width: 100%;
            box-sizing: border-box;
            padding: 5px;
        }
        .result {
            margin-top: 15px;
            font-weight: bold;
        }
        .correct {
            color: green;
        }
        .wrong {
            color: red;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Ответьте на вопрос</h2>

    <p>Какой город является столицей России?</p>

    <label for="answer">Ваш ответ:</label>
    <input type="text" id="answer">

    <button id="checkBtn">Проверить</button>

    <div class="result" id="result"></div>
</div>

<script>
    document.getElementById('checkBtn').addEventListener('click', function () {
        const answerInput = document.getElementById('answer');
        const resultDiv = document.getElementById('result');
        const userAnswer = answerInput.value.trim().toLowerCase();

        if (userAnswer.length === 0) {
            resultDiv.textContent = 'Введите ответ.';
            resultDiv.className = 'result wrong';
            return;
        }

        const correctAnswer = 'москва';

        if (userAnswer === correctAnswer) {
            resultDiv.textContent = 'Ответ верный!';
            resultDiv.className = 'result correct';
        } else {
            resultDiv.textContent = 'Ответ неверный. Правильный ответ: Москва.';
            resultDiv.className = 'result wrong';
        }
    });
</script>
</body>
</html>
