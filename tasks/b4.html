<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Изменение размеров изображения</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        .container { max-width: 500px; border: 1px solid #ccc; padding: 20px; }
        label { display: block; margin-top: 10px; }
        input, button { margin-top: 5px; padding: 5px; width: 100%; box-sizing: border-box; }
        img { display: block; margin-top: 15px; border: 1px solid #666; }
    </style>
</head>
<body>
<div class="container">
    <h2>Изменение параметров изображения</h2>

    <label for="width">Ширина (px):</label>
    <input type="number" id="width" value="200" min="10">

    <label for="height">Высота (px):</label>
    <input type="number" id="height" value="150" min="10">

        <label for="border">Толщина рамки (px):</label>
    <input type="number" id="border" value="1" min="0">
    <button id="applyBtn">Применить</button>

    <img id="picture" src="https://novayagazeta.ru/static/records/bec4ac4a0d544693a4f4414fe4d50a0d.jpeg" alt="Пример изображения">
</div>

<<script>
    const img = document.getElementById('picture');
    const widthInput = document.getElementById('width');
    const heightInput = document.getElementById('height');
    const borderInput = document.getElementById('border');
    const btn = document.getElementById('applyBtn');

    btn.addEventListener('click', function () {
        const w = parseInt(widthInput.value);
        const h = parseInt(heightInput.value);
        const b = parseInt(borderInput.value);

        if (isNaN(w) || isNaN(h) || w <= 0 || h <= 0) {
            alert('Введите положительные числовые значения ширины и высоты.');
            return;
        }

        img.width = w;
        img.height = h;

        if (!isNaN(b) && b >= 0) {
            img.style.borderStyle = 'solid';
            img.style.borderColor = '#666';
            img.style.borderWidth = b + 'px';
        }
    });
</script>
</body>
</html>
