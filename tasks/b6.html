<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Первый абзац и буква</title>
    <link rel="stylesheet" href="styles6.css">
    <style>
        /* Внутренний стиль: первая строка абзаца */
        p::first-line {
            font-weight: bold;
            color: darkblue;
        }
    </style>
</head>
<body>
<h2>Пример оформления абзацев</h2>

<p class="first-paragraph">
    Это первый абзац текста. Здесь демонстрируется оформление первой строки абзаца
    и первой буквы, используя CSS псевдоэлементы. Остальная часть текста обычная.
</p>

<p>
    Это второй абзац. У него только первая строка оформлена внутренним стилем,
    без увеличенной первой буквы.
</p>
</body>
</html>
