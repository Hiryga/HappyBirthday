<!DOCTYPE html>
<html>
<head>
  <meta charset="windows-1251">
  <title>Работа с формами</title>
  <style>
    body { font-family: Arial, sans-serif; background: #fff; margin: 8px 12px; font-size: 13px; }
    h2 { font-size: 16px; font-weight: bold; margin: 0 0 10px 0; }
    input[type=text] { width: 200px; border: 2px inset #999; padding: 1px 2px; font-size: 13px; display: block; margin-bottom: 4px; }
    input[type=button] { padding: 2px 10px; font-size: 13px; border: 2px outset #ccc; background: #d4d0c8; cursor: pointer; display: block; margin-bottom: 8px; }
    input[type=button]:active { border-style: inset; }
    #output { font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>

  <h2>Приветствие коллегам</h2>

  <input type="text" id="name" value="">
  <input type="button" value="Пуск" onclick="greet()">
  <input type="button" value="Очистить" onclick="clearAll()">

  <div id="output"></div>

<script>
function greet() {
  var name = document.getElementById('name').value.trim();
  if (!name) { alert('Введите имя'); return; }
  document.getElementById('output').innerHTML = 'Привет друг мой ' + name;
}
function clearAll() {
  document.getElementById('name').value = '';
  document.getElementById('output').innerHTML = '';
}
</script>
</body>
</html>
