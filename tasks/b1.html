<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Подписка</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        .container {
            max-width: 400px;
            border: 1px solid #ccc;
            padding: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        select, input, button {
            margin-top: 5px;
            width: 100%;
            box-sizing: border-box;
            padding: 5px;
        }
        .result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Оформление подписки</h2>

    <label for="period">Выберите период:</label>
    <select id="period">
        <option value="" selected disabled>Выберите...</option>
        <option value="1">1 месяц</option>
        <option value="3">3 месяца</option>
        <option value="6">6 месяцев</option>
        <option value="12">12 месяцев</option>
    </select>

    <label for="price">Цена за 1 месяц (руб):</label>
    <input type="number" id="price" value="300" min="0">

    <button id="calcBtn">Рассчитать стоимость</button>

    <div class="result" id="result"></div>
</div>

<script>
    document.getElementById('calcBtn').addEventListener('click', function () {
        const period = parseInt(document.getElementById('period').value);
        const price = parseFloat(document.getElementById('price').value);
        const resultDiv = document.getElementById('result');

        if (isNaN(period) || isNaN(price)) {
            resultDiv.textContent = 'Заполните все поля.';
            return;
        }

        let total = period * price;

   

        resultDiv.textContent = 'Стоимость подписки: ' + total.toFixed(2) + ' руб.';
    });
</script>
</body>
</html>
