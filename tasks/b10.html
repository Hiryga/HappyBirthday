<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Степень числа (PHP)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        .container { max-width: 400px; border: 1px solid #ccc; padding: 20px; }
        input, button { margin-top: 5px; padding: 5px; width: 100%; box-sizing: border-box; }
        .row { margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Вычисление степени числа</h2>

    <form action="b10.php" method="post">
        <div class="row">
            <label for="base">Основание:</label>
            <input type="number" id="base" name="base" step="0.01" required>
        </div>

        <div class="row">
            <label for="exp">Показатель степени:</label>
            <input type="number" id="exp" name="exp" step="1" required>
        </div>

        <div class="row">
            <input type="submit" value="Вычислить">
        </div>
    </form>
</div>
</body>
</html>
